version: '3.8'

services:
  db:
    image: postgres:15
    container_name: practica6_db
    environment:
      POSTGRES_USER: practica6
      POSTGRES_PASSWORD: practica6
      POSTGRES_DB: practica6
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practica6 -d practica6"]
      interval: 5s
      timeout: 5s
      retries: 5

  normalizador:
    build: .
    container_name: practica6_normalizador
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./sql:/app/sql
      - ./scripts:/app/scripts
    # Si tu script requiere conectarse a la BD, pasa las variables:
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: practica6
      DB_PASSWORD: practica6
      DB_NAME: practica6
    command: python scripts/normalize_dataset2.py

volumes:
  postgres_data: